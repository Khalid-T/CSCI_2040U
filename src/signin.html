<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Flora Catalogue</title>

    <style>
        body {
            margin: 0;
            font-family: Georgia, serif;
            background-color: #f0eaea;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #145b14;
            padding: 10px 10px 30px 10px;
            border-bottom: 2px solid #4CAF50;
            margin-bottom: 50px;
            overflow: hidden;
        }

        header a {
            text-decoration: none;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #f7c2c0;
            border: 3px double #7b7f32;
            border-left: 15px solid #106bd9;
            padding: 15px 30px;
            display: block;
            width: fit-content;
            margin: 20px auto;
            background-color: rgba(255, 255, 255, 0.05);
            text-align: center;
            border-radius: 4px;
            box-shadow: 8px 8px 0px #0b460b;
            transition: all 0.3s ease;
        }

        h1:hover {
            transform: translateY(-5px);
            box-shadow: 12px 12px 0px #c1d6c1;
        }

        .signin-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .login-card {
            background-color: white;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-top: 5px solid #2d5a27;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: #145b14;
            margin-top: 0;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-size: 0.9rem;
            font-weight: bold;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: Georgia, serif;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #106bd9;
            box-shadow: 0 0 5px rgba(16, 107, 217, 0.2);
        }

        .signin-btn {
            width: 100%;
            background-color: #2d5a27;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        .signin-btn:hover {
            background-color: #4CAF50;
            transform: translateY(-2px);
        }

        .signup-text {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 25px;
            color: #555;
        }

        .signup-text a {
            color: #106bd9;
            font-weight: bold;
            text-decoration: none;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .back-link:hover {
            color: #145b14;
        }

        .floral-accent {
            text-align: center;
            color: #7b7f32;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }
    </style>
</head>

<body>
<header>
    <a href="index.html">
        <h1>Flora Catalogue</h1>
    </a>
</header>

<div class="signin-container">
    <div class="login-card">
        <h2>Member Login</h2>

        <form action="/login-endpoint" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="e.g. FernFanatic" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="signin-btn">Enter the Garden</button>
        </form>

        <p class="signup-text">
            No account? <a href="signup.html">Sign up here</a>
        </p>

        <a href="index.html" class="back-link">← Back to Catalogue</a>
    </div>
</div>
</body>
</html>
