<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flora Catalogue</title>

    <style>
        body {
            margin: 0;
            font-family: Georgia, serif;
            background-color: #f0eaea;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #f7c2c0;
            border: 3px double #7b7f32;
            border-left: 15px solid #106bd9;
            padding: 20px 40px;
            display: block;
            width: fit-content;
            margin: 40px auto;
            background-color: #dedada00;
            text-align: center;
            border-radius: 4px;
            box-shadow: 10px 10px 0px #0b460b;
            transition: all 0.3s ease;
        }

        h1:hover {
            transform: translateY(-5px);
            box-shadow: 15px 15px 0px #c1d6c1;
            cursor: pointer;
        }

        a[href*="signin"] {
            display: inline-block;
            background-color: #2d5a27;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
            float: right;
            margin: 10px;
        }

        a[href*="signin"]:hover {
            background-color: #4CAF50;
        }

        header {
            background-color: #145b14;
            padding: 10px 10px 30px 10px;
            border-bottom: 2px solid #4CAF50;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .subtitle {
            text-align: center;
            font-style: italic;
            color: #666;
            margin-top: -20px;
        }

        .plants-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            padding: 20px;
        }

        .plant-card {
            background-color: white;
            width: 250px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .plant-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
        }

        .wishlist-btn {
            background-color: #f8f9f8;
            color: #2d5a27;
            border: 2px solid #2d5a27;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            transition: 0.3s;
        }

        .wishlist-btn:hover {
            background-color: #2d5a27;
            color: white;
        }
    </style>
</head>

<body>
    <header>
        <a href="./signin.html">Sign In</a>
        <h1>Flora Catalogue</h1>
        <p class="subtitle">Est. 2026 — Curated Botanicals</p>
    </header>

    <div class="plants-container">
        <div class="plant-card">
            <img src="./Images/134097934838567213.jpg" alt="Greenland Moss">
            <h3>Greenland Moss</h3>
            <p>A classic indoor favorite.</p>
            <button class="wishlist-btn" onclick="alert('Added Greenland Moss to Wishlist!')">
                + Add to Wishlist
            </button>
        </div>

        <div class="plant-card">
        <img src="./Images/photo3.jpg" alt="Monstera Adansonii">
            <h3>Monstera Adansonii</h3>
            <p>Known for its unique leaf holes.</p>
            <button class="wishlist-btn" onclick="alert('Added Monstera Adansonii to Wishlist!')">
                + Add to Wishlist
            </button>
        </div>

        <div class="plant-card">
            <img src="./Images/snake-plant.jpg" alt="Snake Plant">
            <h3>Snake Plant</h3>
            <p>Easy to care for and perfect for beginners.</p>
            <button class="wishlist-btn" onclick="alert('Added Snake Plant to Wishlist!')">
                + Add to Wishlist
            </button>
        </div>

        <div class="plant-card">
            <img src="./Images/peace-lily.jpg" alt="Peace Lily">
            <h3>Peace Lily</h3>
            <p>A beautiful plant with elegant white blooms.</p>
            <button class="wishlist-btn" onclick="alert('Added Peace Lily to Wishlist!')">
                + Add to Wishlist
            </button>
        </div>
    </div>
</body>
</html>
