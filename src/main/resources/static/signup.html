<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Flora Catalogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        /* Reusing exact styles from signin for consistency */
        :root { --forest: #1a3c34; --sage: #7b8d7e; --parchment: #f9f7f2; --gold: #c5a059; --text: #2c2c2c; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: var(--parchment); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }
        .glass-nav { display: flex; justify-content: center; padding: 20px 5%; background: white; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: var(--forest); text-decoration: none; letter-spacing: 1px; font-weight: 600; }
        .auth-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .auth-card { background: white; padding: 50px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); text-align: center; }
        h2 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; color: var(--forest); margin-bottom: 10px; }
        .subtitle { font-size: 0.8rem; color: var(--sage); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); display: block; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border: 1px solid #eee; font-family: inherit; box-sizing: border-box; outline: none; }
        .signup-btn { width: 100%; background: var(--forest); color: white; padding: 15px; border: none; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; cursor: pointer; margin-top: 10px; transition: 0.4s; }
        .signup-btn:hover { background: #25554a; }
        .footer-links { margin-top: 30px; font-size: 0.85rem; }
        .footer-links a { color: var(--sage); text-decoration: none; border-bottom: 1px solid var(--gold); }
    </style>
</head>
<body>

<nav class="glass-nav">
    <a href="index.html" class="nav-logo">Flora Catalogue</a>
</nav>

<div class="auth-container">
    <div class="auth-card">
        <h2>Join the Collection</h2>
        <p class="subtitle">Create Your Profile</p>

        <form action="/signup-endpoint" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="signup-btn">Grow Your Account</button>
        </form>

        <div class="footer-links">
            <p>Already a member? <a href="signin.html">Log in here</a></p>
            <a href="index.html">← Back to Catalogue</a>
        </div>
    </div>
</div>

</body>
</html>
