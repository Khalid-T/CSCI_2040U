<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Flora Catalogue</title>
    <style>
        /* Reusing your existing styles for consistency */
        body { margin: 0; font-family: Georgia, serif; background-color: #f0eaea; display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: #145b14; padding: 10px 10px 30px 10px; border-bottom: 2px solid #4CAF50; margin-bottom: 50px; }
        h1 { font-family: 'Playfair Display', serif; color: #f7c2c0; border: 3px double #7b7f32; border-left: 15px solid #106bd9; padding: 15px 30px; width: fit-content; margin: 20px auto; background-color: rgba(255, 255, 255, 0.05); text-align: center; border-radius: 4px; box-shadow: 8px 8px 0px #0b460b; }
        .container { flex-grow: 1; display: flex; justify-content: center; align-items: flex-start; padding: 20px; }
        .card { background-color: white; width: 100%; max-width: 400px; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 5px solid #106bd9; }
        h2 { font-family: 'Playfair Display', serif; color: #145b14; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .signup-btn { width: 100%; background-color: #106bd9; color: white; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .signup-btn:hover { background-color: #0d54a8; }
        .login-link { display: block; text-align: center; margin-top: 20px; color: #145b14; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
<header><h1>Flora Catalogue</h1></header>
<div class="container">
    <div class="card">
        <h2>Grow Your Account</h2>
        <form action="/signup-endpoint" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="signup-btn">Create Account</button>
        </form>
        <a href="signin.html" class="login-link">Already a member? Sign in</a>
    </div>
</div>
</body>
</html>
