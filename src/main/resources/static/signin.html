<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Flora Catalogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest: #1a3c34;
            --sage: #7b8d7e;
            --parchment: #f9f7f2;
            --gold: #c5a059;
            --text: #2c2c2c;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--parchment);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .glass-nav {
            display: flex;
            justify-content: center;
            padding: 20px 5%;
            background: white;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            color: var(--forest);
            text-decoration: none;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .auth-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-card {
            background: white;
            padding: 50px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
        }

        h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            color: var(--forest);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--sage);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold);
            display: block;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #eee;
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--sage);
        }

        .signin-btn {
            width: 100%;
            background: var(--forest);
            color: white;
            padding: 15px;
            border: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.4s;
        }

        .signin-btn:hover {
            background: #25554a;
        }

        .footer-links {
            margin-top: 30px;
            font-size: 0.85rem;
        }

        .footer-links a {
            color: var(--sage);
            text-decoration: none;
            border-bottom: 1px solid var(--gold);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>

<nav class="glass-nav">
    <a href="index.html" class="nav-logo">Flora Catalogue</a>
</nav>

<div class="auth-container">
    <div class="auth-card" id="login-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Access the Archives</p>

        <form action="/login-endpoint" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="signin-btn">Enter the Garden</button>
        </form>

        <div class="footer-links">
            <p>No account? <a href="signup.html">Sign up here</a></p>
            <a href="index.html">← Back to Catalogue</a>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const card = document.getElementById('login-card');

    if (urlParams.has('error')) {
        const errorDiv = document.createElement('div');
        errorDiv.style.color = '#a34a4a';
        errorDiv.style.fontSize = '0.8rem';
        errorDiv.style.marginBottom = '20px';
        errorDiv.style.animation = "shake 0.4s ease-in-out";
        errorDiv.innerText = 'Invalid username or password.';
        card.insertBefore(errorDiv, card.querySelector('form'));
    }

    if (urlParams.has('registered')) {
        const successDiv = document.createElement('div');
        successDiv.style.color = '#1a3c34';
        successDiv.style.fontSize = '0.8rem';
        successDiv.style.marginBottom = '20px';
        successDiv.innerText = 'Registration successful! Please sign in.';
        card.insertBefore(successDiv, card.querySelector('form'));
    }
</script>

</body>
</html>
