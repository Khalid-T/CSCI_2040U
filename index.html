<!DOCTYPE html>
<html lang="en">


<head>
    <!-- importing font -->
     <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Flora Catalogue</title>
<!-- making the header look nice -->
 <style>
    h1{
        /* font for title */
        font-family: 'Playfair Display', serif;
        color: #1b3d17;

        /* green border around title */
        border: 3px double #4CAF50;
        border-left: 15px solid #2d5a27;
        

        /* overall layout and shape */
        padding: 20px 40px;
        display: block;
        width: fit-content;
        margin: 40px auto;
        background-color: #ffffff;

        /* Text Alignment */
        text-align: center;
        border-radius: 15px;
    
    /* additional details */
        border-radius: 4px;     /*sharp corners*/
        box-shadow: 10px 10px 0px #e0eee0; /* A "Hard Shadow"*/
        transition: all 0.3s ease; /* hover effect happens in 3 seconds */


    }

/* user interaction with title */
h1:hover {
    transform: translateY(-5px); /* moves title up slightly when you hover */
    box-shadow: 15px 15px 0px #c1d6c1;
    cursor: pointer;
}

/* signin style */

a[href*="signin"] {
            display: inline-block;
            background-color: #2d5a27;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
            float: right;
            margin: 10px;
        }

        a[href*="signin"]:hover {
            background-color: #4CAF50;
        }


        /* adding a block of colour behind title */
        header {
            background-color: #e8f0e8; /* The block of color behind everything */
            padding: 10px 10px;        /* Adds space so the text isn't cramped */
            border-bottom: 2px solid #4CAF50; /* A thin green line to separate it from the bottom */
            margin-bottom: 30px;       /* Pushes the rest of the website content down */
            
            /* This ensures the Sign In button stays inside the green block */
            overflow: hidden; 
        }

        /*  */
        .subtitle {
            text-align: center; 
            font-style: italic; 
            color: #666; 
            margin-top: -30px;
        }

        /* Container for the plant item */
.plant-card {
    background-color: white;
    width: 300px;
    margin: 20px auto; /* Centers the card */
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    text-align: center;
}

/* Styles the image to fit perfectly */
.plant-card img {
    width: 100%;       /* Fills the card width */
    height: 200px;     /* Set a fixed height */
    object-fit: cover; /* Crops image to fit without stretching */
    border-radius: 10px;
}

/* The Wishlist Button */
.wishlist-btn {
    background-color: #f8f9f8;
    color: #2d5a27;
    border: 2px solid #2d5a27;
    padding: 10px 15px;
    border-radius: 25px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 15px;
    transition: 0.3s;
}

.wishlist-btn:hover {
    background-color: #2d5a27;
    color: white;
}

 </style>

</head>
<body>
    <header>
 <a href="./pages/signin.html">Sign In</a>
    <h1>Flora Catalogue</h1>
<p style="text-align: center; font-style: italic; color: #666; margin-top: -30px;">
    Est. 2026 — Curated Botanicals
</header>

</p>


    <div class="plant-card">
        <img src="./Images/134097934838567213.jpg" alt="Beautiful Scenery">
        <h3>Greenland moss</h3>
        <p>A classic indoor favorite.</p>
        
        <button class="wishlist-btn" onclick="alert('Added to Wishlist!')">
            + Add to Wishlist
        </button>
    </div>
    <div class="plant-card">
        <img src="./Images/133859431787636984.jpg.jpg" alt="Monstera Adansonii">
        <h3>Monstera Adansonii</h3>
        <p>Known for its unique leaf holes.</p>
        <button class="wishlist-btn" onclick="alert('Added Monstera to Wishlist!')">
            + Add to Wishlist
        </button>
    </div>
